        <h1 class="usuario">Cadastro de Usuário</h1>

        <form class="form" method="POST">

            <label for="name">Nome</label><br>
            <input id="name" class="name2" placeholder="Digite seu nome" required>

            <br><br>

            <label for="email">E-mail</label><br>
            <input id="email" placeholder="Digite seu e-mail" required>

            <br><br>

            <label for="curso" class="curso">Curso</label><br>

                <option>JavaScript</option>

            </select>

            <br><br>

            <label class="sobre">Sobre você</label><br>
